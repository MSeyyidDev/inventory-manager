services:
  - type: web
    name: inventory-manager-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./inventory.db
      - key: CORS_ORIGINS
        value: https://inventory-manager.vercel.app,http://localhost:5173,http://127.0.0.1:5173
